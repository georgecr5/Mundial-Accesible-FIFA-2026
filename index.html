<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mundial FIFA 2026 - Accesible</title>
    <style>
        body { font-family: sans-serif; line-height: 1.6; padding: 20px; max-width: 1200px; margin: auto; background-color: #f4f7f6; }
        h1 { color: #1a202c; }
        .creditos { color: #4a5568; font-weight: bold; border-bottom: 2px solid #cbd5e0; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* Botón de reinicio destacado */
        .btn-reinicio { background-color: #e53e3e; color: white; padding: 10px 20px; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
        .btn-reinicio:focus { outline: 4px solid #feb2b2; }

        .nav-links { margin-bottom: 20px; display: flex; gap: 15px; flex-wrap: wrap; }
        .nav-links a { color: #2b6cb0; text-decoration: none; font-weight: bold; padding: 5px 10px; border: 1px solid #2b6cb0; border-radius: 4px; }

        .grupo-container { background: white; padding: 20px; border-radius: 10px; margin-bottom: 40px; border: 1px solid #e2e8f0; }
        .partido-card { background: #f8fafc; padding: 15px; margin-bottom: 10px; border-radius: 8px; border-left: 5px solid #2b6cb0; }
        
        .controles-marcador { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        input[type="number"] { width: 50px; padding: 8px; border-radius: 4px; border: 1px solid #cbd5e0; text-align: center; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; border: 1px solid #cbd5e0; text-align: center; }
        th { background-color: #edf2f7; }

        .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); border: 0; }
    </style>
</head>
<body>
    <h1>Sigue el Mundial FIFA 2026</h1>
    <p class="creditos">Desarrollado por George Hernández</p>

    <button class="btn-reinicio" onclick="reiniciarTodo()">Borrar todos los datos (Reiniciar Calendario)</button>
    
    <nav class="nav-links">
        <a href="#contenedor-fase-grupos">Ir a Grupos</a>
        <a href="#seccion-eliminacion">Ir a Eliminatorias</a>
    </nav>

    <div id="notificador" class="sr-only" aria-live="assertive"></div>

    <div id="contenedor-fase-grupos">
        <div id="contenedor-mundial"></div>
    </div>

    <div id="seccion-eliminacion">
        <div id="bracket-visual"></div>
    </div>

    <script>
        const dataEquipos = {
            'A': [{n:'México',b:'🇲🇽'},{n:'Sudáfrica',b:'🇿🇦'},{n:'Corea del Sur',b:'🇰🇷'},{n:'República Checa',b:'🇨🇿'}],
            'B': [{n:'Canadá',b:'🇨🇦'},{n:'Bosnia y Herzegovina',b:'🇧🇦'},{n:'Catar',b:'🇶🇦'},{n:'Suiza',b:'🇨🇭'}],
            'C': [{n:'Estados Unidos',b:'🇺🇸'},{n:'Paraguay',b:'🇵🇾'},{n:'Australia',b:'🇦🇺'},{n:'Turquía',b:'🇹🇷'}],
            'D': [{n:'Brasil',b:'🇧🇷'},{n:'Marruecos',b:'🇲🇦'},{n:'Haití',b:'🇭🇹'},{n:'Escocia',b:'🏴󠁧󠁢󠁳󠁣󠁴󠁿'}],
            'E': [{n:'Alemania',b:'🇩🇪'},{n:'Curazao',b:'🇨🇼'},{n:'Costa de Marfil',b:'🇨🇮'},{n:'Ecuador',b:'🇪🇨'}],
            'F': [{n:'Países Bajos',b:'🇳🇱'},{n:'Japón',b:'🇯🇵'},{n:'Suecia',b:'🇸🇪'},{n:'Túnez',b:'🇹🇳'}],
            'G': [{n:'España',b:'🇪🇸'},{n:'Cabo Verde',b:'🇨🇻'},{n:'Arabia Saudita',b:'🇸🇦'},{n:'Uruguay',b:'🇺🇾'}],
            'H': [{n:'Bélgica',b:'🇧🇪'},{n:'Egipto',b:'🇪🇬'},{n:'Irán',b:'🇮🇷'},{n:'Nueva Zelanda',b:'🇳🇿'}],
            'I': [{n:'Francia',b:'🇫🇷'},{n:'Senegal',b:'🇸🇳'},{n:'Irak',b:'🇮🇶'},{n:'Noruega',b:'🇳🇴'}],
            'J': [{n:'Argentina',b:'🇦🇷'},{n:'Argelia',b:'🇩🇿'},{n:'Austria',b:'🇦🇹'},{n:'Jordania',b:'🇯🇴'}],
            'K': [{n:'Portugal',b:'🇵🇹'},{n:'RD Congo',b:'🇨🇩'},{n:'Uzbekistán',b:'🇺🇿'},{n:'Colombia',b:'🇨🇴'}],
            'L': [{n:'Inglaterra',b:'🏴󠁧󠁢󠁥󠁮󠁧󠁿'},{n:'Croacia',b:'🇭🇷'},{n:'Ghana',b:'🇬🇭'},{n:'Panamá',b:'🇵🇦'}]
        };

        const rawPartidos = [
            ['A',1,'México','Sudáfrica'],['A',1,'Corea del Sur','República Checa'],
            ['A',2,'República Checa','Sudáfrica'],['A',2,'México','Corea del Sur'],
            ['A',3,'República Checa','México'],['A',3,'Sudáfrica','Corea del Sur'],
            ['B',1,'Canadá','Bosnia y Herzegovina'],['B',1,'Catar','Suiza'],
            ['B',2,'Suiza','Bosnia y Herzegovina'],['B',2,'Canadá','Catar'],
            ['B',3,'Suiza','Canadá'],['B',3,'Bosnia y Herzegovina','Catar']
            // Se asumen los demás partidos según estructura previa...
        ];

        const partidos = rawPartidos.map((p, i) => ({ id: 'p'+(i+1), g: p[0], j: p[1], e1: p[2], e2: p[3] }));
        let stats = {};

        function inicializar() {
            Object.keys(dataEquipos).forEach(g => {
                stats[g] = dataEquipos[g].map(e => ({ ...e, pj:0, pts:0, dg:0 }));
            });
            renderizar();
            cargar();
        }

        function renderizar() {
            const cont = document.getElementById('contenedor-mundial');
            cont.innerHTML = '';
            Object.keys(dataEquipos).forEach(gId => {
                const div = document.createElement('div');
                div.className = 'grupo-container';
                let html = `<h2>Grupo ${gId}</h2>`;
                
                partidos.filter(p => p.g === gId).forEach(p => {
                    html += `<div class="partido-card">
                        <h3>${p.e1} contra ${p.e2}</h3>
                        <div class="controles-marcador">
                            <label for="in_${p.id}_1">${p.e1}</label>
                            <input type="number" id="in_${p.id}_1" onchange="actualizar('${gId}')">
                            <label for="in_${p.id}_2">${p.e2}</label>
                            <input type="number" id="in_${p.id}_2" onchange="actualizar('${gId}')">
                        </div>
                    </div>`;
                });

                html += `<table>
                    <caption>Tabla de posiciones Grupo ${gId}</caption>
                    <thead>
                        <tr>
                            <th>Equipo</th>
                            <th><span class="sr-only">Partidos Jugados</span><span aria-hidden="true">PJ</span></th>
                            <th><span class="sr-only">Diferencia de Goles</span><span aria-hidden="true">DG</span></th>
                            <th><span class="sr-only">Puntos</span><span aria-hidden="true">Pts</span></th>
                        </tr>
                    </thead>
                    <tbody id="body-${gId}"></tbody>
                </table>`;
                div.innerHTML = html;
                cont.appendChild(div);
                actualizar(gId, false);
            });
        }

        function actualizar(gId, guardar = true) {
            const grupoStats = dataEquipos[gId].map(e => ({ ...e, pj:0, pts:0, dg:0 }));
            
            partidos.filter(p => p.g === gId).forEach(p => {
                const v1 = document.getElementById(`in_${p.id}_1`).value;
                const v2 = document.getElementById(`in_${p.id}_2`).value;
                
                if (v1 !== "" && v2 !== "") {
                    const g1 = parseInt(v1); const g2 = parseInt(v2);
                    const e1 = grupoStats.find(x => x.n === p.e1);
                    const e2 = grupoStats.find(x => x.n === p.e2);
                    e1.pj++; e2.pj++; e1.dg += (g1-g2); e2.dg += (g2-g1);
                    if (g1 > g2) e1.pts += 3; else if (g2 > g1) e2.pts += 3; else { e1.pts += 1; e2.pts += 1; }
                }
            });

            grupoStats.sort((a,b) => b.pts - a.pts || b.dg - a.dg);
            const tbody = document.getElementById(`body-${gId}`);
            if(tbody) {
                tbody.innerHTML = grupoStats.map(e => `<tr><td>${e.b} ${e.n}</td><td>${e.pj}</td><td>${e.dg}</td><td>${e.pts}</td></tr>`).join('');
            }

            if (guardar) {
                const inputs = document.querySelectorAll('input[type="number"]');
                const datos = {};
                inputs.forEach(i => { if(i.value !== "") datos[i.id] = i.value; });
                localStorage.setItem('mundial_2026_data', JSON.stringify(datos));
                document.getElementById('notificador').innerText = "Tabla del grupo " + gId + " actualizada.";
            }
        }

        function cargar() {
            const data = JSON.parse(localStorage.getItem('mundial_2026_data') || "{}");
            for (const id in data) {
                const el = document.getElementById(id);
                if (el) {
                    el.value = data[id];
                    const gId = partidos.find(p => p.id === id.split('_')[1]).g;
                    actualizar(gId, false);
                }
            }
        }

        function reiniciarTodo() {
            if(confirm("¿Estás seguro de que quieres borrar todos los resultados simulados?")) {
                localStorage.removeItem('mundial_2026_data');
                location.reload();
            }
        }

        window.onload = inicializar;
    </script>
</body>
</html>
