        function reproducirSonido(tipo) {
            try {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                if (tipo === 'confirmar') {
                    osc.frequency.setValueAtTime(800, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.start(); 
                    osc.stop(audioCtx.currentTime + 0.1);
                } else if (tipo === 'faseCompleta') {
                    const notas = [440, 554, 659, 880];
                    notas.forEach((f, i) => {
                        osc.frequency.setValueAtTime(f, audioCtx.currentTime + (i * 0.1));
                    });
                    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
                    osc.start(); 
                    osc.stop(audioCtx.currentTime + 0.5);

            grupoStats.forEach(e => { e.pj=0; e.pts=0; e.dg=0; });

            partidos.filter(p => p.g === gId).forEach(p => {
                const val1 = document.getElementById(`in_${p.id}_1`).value;
                const val2 = document.getElementById(`in_${p.id}_2`).value;
                if (val1 !== "" && val2 !== "") {
                    const g1 = parseInt(val1); const g2 = parseInt(val2);
                    const e1 = grupoStats.find(x => x.n === p.e1); const e2 = grupoStats.find(x => x.n === p.e2);
                    if(e1 && e2) {
                        e1.pj++; e2.pj++; e1.dg += (g1-g2); e2.dg += (g2-g1);
                        if (g1 > g2) e1.pts += 3; else if (g2 > g1) e2.pts += 3; else { e1.pts += 1; e2.pts += 1; }
                    }
                }
            });

            grupoStats.sort((a,b) => b.pts - a.pts || b.dg - a.dg);
            const container = document.getElementById(`cont-${gId}`);
            if (grupoStats[0].pj > 0) container.style.backgroundColor = grupoStats[0].c;

            const narracion = document.getElementById(`narracion-${gId}`);
            let texto = `<h3>Posiciones Grupo ${gId}</h3><ul>`;
            grupoStats.forEach((e, i) => {
                texto += `<li>Posición ${i+1}: ${e.n}. Puntos: ${e.pts}.</li>`;
            });
            texto += "</ul>";
            narracion.innerHTML = texto;

            if (guardar) { guardarDatosLocales(); reproducirSonido('confirmar'); }
            if (!esCargaInicial) { actualizarBracket(); }
        }

        function actualizarBracket() {
            const mapClasificados = {};
            
            // Llenar clasificados de la Fase de Grupos
            Object.keys(dataEquipos).forEach(g => {
                const jugados = partidos.filter(p => p.g === g && document.getElementById(`in_${p.id}_1`).value !== "").length;
                if (jugados >= 1) { 
                    mapClasificados[`Primero Grupo ${g}`] = stats[g][0];
                    mapClasificados[`Segundo Grupo ${g}`] = stats[g][1];
                }
            });

            // Evaluar ganadores de las llaves de Eliminatoria
            llavesEliminacion.forEach(llave => {
                const in1 = document.getElementById(`in_${llave.id}_1`);
                const in2 = document.getElementById(`in_${llave.id}_2`);
                if (in1 && in2 && in1.value !== "" && in2.value !== "") {
                    const g1 = parseInt(in1.value);
                    const g2 = parseInt(in2.value);
                    let e1 = mapClasificados[llave.eq1] || { n: llave.eq1, b: '', c: 'rgba(200,200,200,0.2)' };
                    let e2 = mapClasificados[llave.eq2] || { n: llave.eq2, b: '', c: 'rgba(200,200,200,0.2)' };
                    
                    if (g1 > g2) {
                        mapClasificados[`Ganador ${llave.id}`] = e1;
                        mapClasificados[`Perdedor ${llave.id}`] = e2;
                    } else if (g2 > g1) {
                        mapClasificados[`Ganador ${llave.id}`] = e2;
                        mapClasificados[`Perdedor ${llave.id}`] = e1;
                    } else {
                        mapClasificados[`Ganador ${llave.id}`] = { n: `Ganador (Penales)`, b: '', c: 'rgba(200,200,200,0.2)' };
                    }
                }
            });

            const visual = document.getElementById('bracket-visual');
            const notificaciones = document.getElementById('notificaciones-eliminatoria');
            let html = ""; 
            let rondaActual = "";

            llavesEliminacion.forEach(llave => {
                // AQUÍ: La Fase (Octavos, Cuartos) es H2 (Tecla 2)
                if (llave.r !== rondaActual) {
                    html += `<h2>${llave.r}</h2>`;
                    rondaActual = llave.r;
                }
                
                let e1 = mapClasificados[llave.eq1] || { n: llave.eq1, b: '', c: 'rgba(200,200,200,0.2)' };
                let e2 = mapClasificados[llave.eq2] || { n: llave.eq2, b: '', c: 'rgba(200,200,200,0.2)' };

                const val1 = document.getElementById(`in_${llave.id}_1`) ? document.getElementById(`in_${llave.id}_1`).value : '';
                const val2 = document.getElementById(`in_${llave.id}_2`) ? document.getElementById(`in_${llave.id}_2`).value : '';

                // AQUÍ: El Partido es H3 (Tecla 3) igual que en los Grupos
                html += `<div class="partido-card llave-card" style="background: linear-gradient(90deg, ${e1.c}, #fff, ${e2.c});">
                    <h3 class="titulo-partido">Jornada de ${llave.r}: ${e1.n} vs ${e2.n}. ${llave.f}, ${llave.h}, Estadio ${llave.s}</h3>
                    <div class="controles-marcador">
                        <label for="in_${llave.id}_1"><span aria-hidden="true">${e1.b}</span> ${e1.n}</label>
                        <input type="number" id="in_${llave.id}_1" value="${val1}">
                        <span aria-hidden="true">vs</span>
                        <input type="number" id="in_${llave.id}_2" value="${val2}">
                        <label for="in_${llave.id}_2">${e2.n} <span aria-hidden="true">${e2.b}</span></label>
                        <button id="btn_${llave.id}" onclick="procesarLlave('${llave.id}')">Confirmar</button>
                    </div>
                </div>`;
            });
            
            visual.innerHTML = html;
            if (notificaciones) notificaciones.innerText = "Cuadro de eliminatorias actualizado.";
        }

        window.procesarLlave = function(id) {
            initAudio(); 
            reproducirSonido('confirmar');
            guardarDatosLocales();
            actualizarBracket();
            const btn = document.getElementById('btn_' + id);
            if (btn) btn.focus();
        };

        function guardarDatosLocales() {
            const inputs = document.querySelectorAll('input[type="number"]');
            const datos = {};
            inputs.forEach(i => { if(i.value!=="") datos[i.id] = i.value; });
            localStorage.setItem('mundial2026_george', JSON.stringify(datos));
        }

        function cargarDatosGuardados() {
            const guardado = localStorage.getItem('mundial2026_george');
            if (guardado) {
                const datos = JSON.parse(guardado);
                for (const id in datos) { if(document.getElementById(id)) document.getElementById(id).value = datos[id]; }
            }
        }
        
        window.onload = inicializar;
    </script>
</body>
</html>
